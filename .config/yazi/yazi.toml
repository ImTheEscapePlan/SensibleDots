[mgr]
sort_by = "natural"
sort_sensitive = true
sort_dir_first = true
linemode = "size"
show_hidden = true
show_symlink = true
sort_translit = true
scrolloff = 5

[opener]
edit = [
    { run = '"$EDITOR" "$@"', desc = "Editor", block = true, for = "linux" }
]
play = [
    { run = 'vlc "$@"', block = false, desc = "VLC", for = "unix" }
]
imv = [
    { run = 'imv "$@"', desc = "imv", orphan = true }
]
open = [
    { run = 'xdg-open "$@"', desc = "Open", for = "linux" }
]
extract = [
    { run = 'for f in "$@"; do 7z x "$f" -o"${f%.*}"; done', desc = "Extract Archive", block = true }
]

[open]

prepend_rules = [
    { mime = "text/*", use = "edit" },
    { mime = "image/*", use = "imv" },
    { mime = "application/zip", use = "extract" },
    { mime = "application/x-7z-compressed", use = "extract" },
    { mime = "application/x-rar-compressed", use = "extract" },
    { mime = "application/x-tar", use = "extract" },
    { mime = "application/gzip", use = "extract" },
    { mime = "application/x-gzip", use = "extract" },
    { mime = "application/x-bzip2", use = "extract" },
    { mime = "application/x-xz", use = "extract" },
    { mime = "application/x-wim", use = "extract" },
    { mime = "application/x-arj", use = "extract" },
    { mime = "application/vnd.ms-cab-compressed", use = "extract" },
    { url = "*.7z", use = "extract" }
]
rules = [
    { url = "*", use = "open" }
]
append_rules = [
    { mime = "{audio,video}/*", use = "play" }
]


[plugin]

prepend_preloaders = [
    # Office Documents
    { mime = "application/openxmlformats-officedocument.*", run = "office" },
    { mime = "application/oasis.opendocument.*", run = "office" },
    { mime = "application/ms-*", run = "office" },
    { mime = "application/msword", run = "office" },
    { url = "*.docx", run = "office" },
]

prepend_previewers = [
    # Office Documents
    { mime = "application/openxmlformats-officedocument.*", run = "office" },
    { mime = "application/oasis.opendocument.*", run = "office" },
    { mime = "application/ms-*", run = "office" },
    { mime = "application/msword", run = "office" },
    { url = "*.docx", run = "office" },
]
